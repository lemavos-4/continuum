# ============================================================================
# SPRING BOOT APPLICATION PROPERTIES - CONTINUUM API
# ============================================================================

# -------------------------------------------------------
# Spring Main & Security
# -------------------------------------------------------
spring.main.allow-circular-references=true
spring.main.banner-mode=off
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# -------------------------------------------------------
# Dev mode toggle — when DEV_MODE=true exposes dev-only behaviour
# (e.g. email/password sign-in surfaces in the frontend). Mirror this
# flag with VITE_DEV_MODE on the frontend.
# -------------------------------------------------------
app.dev-mode=${DEV_MODE:false}

# -------------------------------------------------------
# MongoDB Atlas
# -------------------------------------------------------
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# -------------------------------------------------------
# Servidor e URLs
# -------------------------------------------------------
server.port=${PORT:8080}
app.url=${APP_URL:http://localhost:5173}
# URL específica do frontend para produção
frontend.url=${APP_URL:http://localhost:5173}

# -------------------------------------------------------
# Google OAuth2 (Chaves Customizadas + Padrão Spring)
# -------------------------------------------------------
# Para o seu GoogleOAuthService (@Value)
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}

# Para o Spring Security OAuth2 Client
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# Use explicit production callback URI by default, but allow override by env var.
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:https://backend-continuum.onrender.com/api/auth/google/callback}

# Provedor Google padrão do Spring
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# -------------------------------------------------------
# JWT Configuration
# -------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
jwt.expiration=${JWT_EXPIRATION:900000}

# -------------------------------------------------------
# Backblaze B2 (Vault)
# -------------------------------------------------------
vault.b2.endpoint=${VAULT_B2_ENDPOINT:s3.us-east-005.backblazeb2.com}
vault.b2.bucket-name=${VAULT_B2_BUCKET:continuum-vaults}
vault.b2.access-key=${VAULT_B2_ACCESS_KEY}
vault.b2.secret-key=${VAULT_B2_SECRET_KEY}
vault.b2.region=${VAULT_B2_REGION:us-east-005}

# -------------------------------------------------------
# Resend (Email)
# -------------------------------------------------------
resend.api-key=${RESEND_API_KEY}
email.from=${EMAIL_FROM:noreply@continuum.com}
email.verification.url=${EMAIL_VERIFICATION_URL:${app.url}/verify-email}

# -------------------------------------------------------
# Lemon Squeezy
# -------------------------------------------------------
lemonsqueezy.api.key=${LEMONSQUEEZY_API_KEY}
lemonsqueezy.webhook.secret=${LEMONSQUEEZY_WEBHOOK_SECRET}
lemonsqueezy.store.id=${LEMONSQUEEZY_STORE_ID}
lemonsqueezy.checkout.success.url=${app.url}/#/subscription?status=success
lemonsqueezy.checkout.cancel.url=${app.url}/#/subscription?status=cancelled
lemonsqueezy.variant.vision=${LEMONSQUEEZY_VARIANT_ID_VISION:}

# -------------------------------------------------------
# Plan limits — only FREE and VISION are active.
# -------------------------------------------------------
plan.free.max-entities=100
plan.free.max-notes=250
plan.free.max-history-days=-1
plan.free.max-metadata-size-kb=10
plan.free.max-vault-size-mb=100
plan.free.advanced-metrics=true
plan.free.data-export=true
plan.free.calendar-sync=true

plan.vision.max-entities=-1
plan.vision.max-notes=-1
plan.vision.max-history-days=-1
plan.vision.max-metadata-size-kb=2048
plan.vision.max-vault-size-mb=4096
plan.vision.advanced-metrics=true
plan.vision.data-export=true
plan.vision.calendar-sync=true

# -------------------------------------------------------
# Outras Configurações
# -------------------------------------------------------
# Use an environment variable for allowed CORS origins in production.
# When unset, backend will fall back to a safe default list.
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:}
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging.level.tech.lemnova.continuum=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
